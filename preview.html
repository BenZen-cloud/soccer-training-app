<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Soccer Training Tracker</title>
    <style>
      :root {
        color: #17211b;
        background: #f7faf8;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      * { box-sizing: border-box; }
      body { margin: 0; min-width: 320px; }
      button, input, textarea, select { font: inherit; }
      header { background: #fff; border-bottom: 1px solid #dbe3dd; }
      .wrap { max-width: 940px; margin: 0 auto; padding: 18px; }
      .top { display: flex; justify-content: space-between; gap: 16px; align-items: center; flex-wrap: wrap; }
      h1, h2, h3, p { margin-top: 0; }
      h1 { margin-bottom: 0; font-size: 28px; letter-spacing: .04em; }
      h2 { font-size: 28px; margin-bottom: 4px; }
      .muted { color: #64746a; font-size: 14px; }
      .brand { display: flex; align-items: center; gap: 12px; }
      .crest { width: 52px; height: 52px; border: 3px solid #237a24; border-radius: 50%; display:grid; place-items:center; background:#fff; box-shadow:0 2px 8px rgba(23,33,27,.08); }
      .ball { width:34px; height:34px; border:2px solid #17211b; border-radius:50%; background:radial-gradient(circle at 50% 50%,#17211b 0 16%,transparent 17%),linear-gradient(36deg,transparent 41%,#17211b 42% 46%,transparent 47%),linear-gradient(108deg,transparent 41%,#17211b 42% 46%,transparent 47%),linear-gradient(180deg,transparent 41%,#17211b 42% 46%,transparent 47%),linear-gradient(252deg,transparent 41%,#17211b 42% 46%,transparent 47%),linear-gradient(324deg,transparent 41%,#17211b 42% 46%,transparent 47%),#fff; }
      .brand strong { color: #237a24; }
      .tag { color:#6b7280; font-size:13px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; }
      .menu { border:0; background:#fff; font-size:34px; line-height:1; color:#17211b; }
      .nav { display: flex; flex-wrap: wrap; gap: 8px; }
      .nav button, .btn {
        border: 1px solid #d3ddd6;
        border-radius: 6px;
        background: #fff;
        color: #26332b;
        padding: 10px 12px;
        cursor: pointer;
        font-weight: 700;
        font-size: 14px;
      }
      .nav button.active, .btn.primary { background: #15803d; border-color: #15803d; color: #fff; }
      .nav {
        position: fixed;
        left: 50%;
        right: auto;
        bottom: 0;
        z-index: 20;
        width: min(100%, 940px);
        transform: translateX(-50%);
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 0;
        border-top: 1px solid #dbe3dd;
        border-left: 1px solid #dbe3dd;
        border-right: 1px solid #dbe3dd;
        background: rgba(255,255,255,.96);
        backdrop-filter: blur(8px);
      }
      .nav button { border: 0; border-radius: 0; padding: 12px 6px 14px; font-weight: 600; }
      .nav button.active { background: #fff; color: #15803d; box-shadow: inset 0 4px 0 #15803d; }
      .btn.light { background: #fff; color: #26332b; }
      .btn.danger { color: #c02626; border-color: #f0c8c8; }
      main { padding: 22px 18px 96px; }
      .grid { display: grid; gap: 18px; }
      .home { grid-template-columns: minmax(0, 1.2fr) minmax(300px, .8fr); }
      .card { background: #fff; border: 1px solid #dbe3dd; border-radius: 8px; padding: 18px; box-shadow: 0 10px 30px rgba(23,33,27,.08); }
      .stats { grid-template-columns: repeat(3, minmax(0, 1fr)); margin: 18px 0; }
      .stat { background: #f4f7f5; border: 1px solid #dbe3dd; border-radius: 8px; padding: 14px; }
      .stat strong { display: block; font-size: 26px; margin-top: 4px; }
      .video { width: 100%; aspect-ratio: 16/9; border: 1px solid #dbe3dd; border-radius: 8px; background: #eef3f0; }
      .video-wrap { position: relative; aspect-ratio: 16/9; border: 1px solid #dbe3dd; border-radius: 8px; overflow: hidden; background: #123; }
      .video-wrap iframe, .video-wrap img, .video-wrap #ytPlayer { position:absolute; inset:0; width:100%; height:100%; border:0; }
      .video-wrap img { z-index: 2; object-fit: cover; opacity: .92; }
      .video-wrap iframe, .video-wrap #ytPlayer { z-index: 1; background: transparent; }
      .video-wrap.playing iframe { z-index: 1; }
      .video-wrap.playing img { display:block; }
      .video-wrap.playing .video-title { display:block; }
      .video-wrap.iframe-loaded.playing img, .video-wrap.iframe-loaded.playing .video-title { display:none; }
      .video-wrap.iframe-loaded.playing iframe { z-index: 5; }
      .video-wrap.iframe-loaded.playing:not(.blocked-preview) .video-fallback { display:none; }
      .video-fallback { position:absolute; inset:0; z-index:3; display:grid; place-items:center; background:rgba(10,20,14,.16); color:#fff; text-align:center; text-decoration:none; font-weight:900; }
      .video-fallback.playing { display:grid; background:rgba(10,20,14,.22); }
      .video-fallback.playing span { background:rgba(0,0,0,.58); border-radius:999px; padding:8px 12px; font-size:13px; }
      .video-fallback.playing .play-dot { display:none; }
      .video-title { position:absolute; left:18px; right:18px; bottom:14px; z-index:1; color:#fff; text-shadow:0 2px 10px rgba(0,0,0,.65); font-weight:900; font-size:20px; }
      .play-dot { width:86px; height:86px; border-radius:50%; display:grid; place-items:center; background:rgba(255,255,255,.92); color:#1f7a24; font-size:42px; margin:0 auto 12px; }
      .timer { background: #0f172a; color: #fff; text-align: center; border-radius: 8px; font-size: 48px; font-weight: 800; padding: 24px; margin: 16px 0; font-variant-numeric: tabular-nums; }
      .buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .progressbar { height: 12px; border-radius: 999px; background: #e9efeb; overflow: hidden; }
      .progressbar span { display: block; height: 100%; background: #15803d; }
      .row { display: grid; grid-template-columns: auto minmax(160px, 1fr) auto auto auto; gap: 12px; align-items: center; border-bottom: 1px solid #e2e8e4; padding: 12px 0; }
      .row:last-child { border-bottom: 0; }
      .compact-list { max-height:520px; overflow:auto; padding-top:6px; padding-bottom:6px; }
      .compact-list .row { grid-template-columns:28px minmax(180px, 1fr) 74px 64px auto; gap:8px; padding:6px 0; font-size:13px; }
      .compact-list .muted { font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
      .compact-list .btn { padding:5px 8px; font-size:12px; }
      .form { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin-bottom: 18px; }
      label { display: grid; gap: 5px; font-size: 13px; font-weight: 700; color: #435047; }
      input, textarea, select { width: 100%; border: 1px solid #cbd5cf; border-radius: 6px; padding: 10px; background: #fff; color: #17211b; }
      textarea { min-height: 72px; resize: vertical; }
      .page-title { margin-bottom: 18px; }
      .two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .pill { display: inline-block; color: #15803d; font-weight: 800; }
      .profile { display:flex; gap:24px; align-items:center; margin-bottom:22px; }
      .jersey { width:104px; height:104px; border:1px solid #dbe3dd; border-radius:50%; display:grid; place-items:center; background:#fff; }
      .jersey img, .player-photo-box img { width:100%; height:100%; object-fit:cover; display:block; }
      .jersey img { border-radius:50%; }
      .shirt { width:58px; height:62px; background:#237a24; color:#fff; display:grid; place-items:center; font-weight:900; font-size:24px; border-radius:18px 18px 8px 8px; clip-path: polygon(18% 12%, 34% 0, 66% 0, 82% 12%, 100% 22%, 88% 42%, 78% 36%, 78% 100%, 22% 100%, 22% 36%, 12% 42%, 0 22%); }
      .meta-line { display:flex; gap:46px; flex-wrap:wrap; margin-top:14px; color:#4b5563; }
      .meta-line span { display:flex; gap:8px; align-items:center; }
      .panel-title { color:#237a24; font-size:20px; font-weight:900; text-transform:uppercase; }
      .panel-head { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:16px; }
      .timer-progress { display:grid; grid-template-columns: 1.25fr .9fr; gap:28px; align-items:stretch; }
      .timer-side { padding-right:28px; border-right:1px solid #dbe3dd; }
      .timer-big { font-size:72px; line-height:1; font-weight:900; letter-spacing:.04em; font-variant-numeric:tabular-nums; margin:42px 0; }
      .progress-side { padding-left:8px; }
      .progress-side .big { font-size:64px; font-weight:900; }
      .progress-side .slash { color:#8b9490; font-size:34px; font-weight:500; }
      .smallbar { height:10px; background:#dce2df; border-radius:999px; overflow:hidden; margin-top:12px; }
      .smallbar span { display:block; height:100%; background:#15803d; }
      .countdown-bar { height:12px; background:#dce2df; border-radius:999px; overflow:hidden; margin:0 0 10px; border:1px solid #cbd8d0; }
      .countdown-bar span { display:block; height:100%; background:#15803d; transition:width .25s linear; }
      .drills-table { width:100%; border-collapse:collapse; }
      .drills-table th { color:#27313a; font-size:12px; text-align:left; padding:12px 10px; border-top:1px solid #e5ebe7; border-bottom:1px solid #e5ebe7; }
      .drills-table td { padding:10px; border-bottom:1px solid #edf1ee; vertical-align:middle; }
      .drills-table input { padding:8px 10px; }
      .drill-selector { max-height: 360px; overflow:auto; border:1px solid #e5ebe7; border-radius:8px; }
      .drill-selector .drills-table th { position:sticky; top:0; z-index:1; background:#f8fbf9; padding:7px 8px; }
      .drill-selector .drills-table td { padding:6px 8px; }
      .drill-selector .drills-table input { padding:5px 7px; font-size:13px; }
      .drill-name-btn { width:100%; text-align:left; padding:6px 8px; border-radius:6px; border:1px solid #d3ddd6; background:#fff; color:#17211b; font-weight:800; cursor:pointer; }
      .select-chip { display:inline-flex; align-items:center; gap:6px; white-space:nowrap; font-size:12px; font-weight:800; }
      .select-chip input { width:auto; }
      .stars { color:#237a24; font-size:21px; letter-spacing:1px; white-space:nowrap; }
      .stars .off { color:#a7adb0; }
      .notes-rating { display:grid; grid-template-columns:1.2fr .9fr; gap:28px; }
      .notes-rating > div:first-child { border-right:1px solid #dbe3dd; padding-right:28px; }
      .session-stars { color:#a7adb0; font-size:50px; letter-spacing:8px; margin:16px 0 24px; }
      .video-controls { display:grid; grid-template-columns: 300px minmax(180px, .8fr) minmax(260px, 1.2fr); gap:12px; margin-bottom:16px; align-items:start; }
      .player-photo-card { grid-row:1 / span 2; align-self:start; display:grid; gap:7px; }
      .player-photo-box { aspect-ratio:1/1; border:1px dashed #aebdb4; border-radius:8px; background:#f4f7f5; overflow:hidden; display:grid; place-items:center; color:#64746a; font-size:12px; font-weight:800; text-align:center; padding:8px; cursor:pointer; }
      .player-photo-card input { position:absolute; width:1px; height:1px; opacity:0; pointer-events:none; }
      .video-stage { grid-column:1/-1; width:min(100%, 820px); justify-self:center; }
      .inline-timer { border:1px solid #dbe3dd; border-radius:8px; padding:12px; background:#f8fbf9; }
      .inline-timer { position: relative; }
      .inline-timer .panel-title { font-size:15px; }
      .inline-timer .timer-big { font-size:28px; margin:8px 0; }
      .inline-timer .btn { padding:7px 10px; font-size:13px; }
      .inline-timer .buttons { gap:6px; }
      .timer-summary { margin-top:10px; border-top:1px solid #dbe3dd; padding-top:8px; display:grid; grid-template-columns:repeat(3, minmax(0, 1fr)); gap:6px; }
      .timer-summary div { border:1px solid #e5ebe7; border-radius:6px; background:#fff; padding:6px; min-width:0; }
      .timer-summary span { display:block; color:#64746a; font-size:10px; font-weight:800; text-transform:uppercase; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
      .timer-summary strong { display:block; color:#17211b; font-size:16px; line-height:1.1; margin-top:2px; }
      .timer-summary .mini-progress { grid-column:1/-1; padding:0; border:0; background:transparent; }
      .count-history { margin-top:10px; display:flex; gap:6px; flex-wrap:wrap; font-size:12px; color:#435047; }
      .count-history span { border:1px solid #dbe3dd; border-radius:999px; padding:4px 8px; background:#fff; }
      .playlist { display:grid; gap:8px; }
      .playlist { gap:6px; max-height:280px; overflow:auto; }
      .playlist-row { display:grid; grid-template-columns:28px minmax(120px,1fr) 72px auto auto; gap:6px; align-items:center; border:1px solid #dbe3dd; border-radius:6px; background:#fff; padding:6px 8px; }
      .playlist-row.active { border-color:#15803d; box-shadow: inset 4px 0 0 #15803d; }
      .playlist-row .order { color:#64746a; font-weight:900; }
      .playlist-row button { padding:4px 7px; }
      .playlist-row .remove { color:#b42318; border-color:#f1c7c2; }
      .playlist-drop { grid-column:1/-1; border:1px solid #dbe3dd; border-radius:8px; background:#f8fbf9; padding:10px; }
      .playlist-drop summary { cursor:pointer; list-style:none; display:flex; justify-content:space-between; align-items:center; gap:10px; font-weight:900; color:#435047; }
      .playlist-drop summary::-webkit-details-marker { display:none; }
      .playlist-drop .chev { color:#15803d; font-size:18px; transition:transform .18s ease; }
      .playlist-drop[open] .chev { transform:rotate(180deg); }
      .playlist-actions { display:flex; justify-content:flex-end; gap:6px; flex-wrap:wrap; margin:10px 0 6px; }
      @media (max-width: 820px) {
        .home, .stats, .form, .two { grid-template-columns: 1fr; }
        .timer-progress, .notes-rating, .video-controls { grid-template-columns:1fr; }
        .timer-side, .notes-rating > div:first-child { border-right:0; padding-right:0; }
        .timer-big { font-size:54px; }
        .profile { align-items:flex-start; }
        .jersey { width:86px; height:86px; }
        .row { grid-template-columns: auto 1fr; }
        .row .actions, .row .meta { grid-column: 2; }
        .drills-table { min-width:760px; }
        .table-scroll { overflow:auto; }
      }
    </style>
  </head>
  <body>

              <div class="playlist">${sessionDrills().map((drill, index) => `<div class="playlist-row ${activeVideoDrill?.id===drill.id?"active":""}"><span class="order">${index + 1}</span><button class="btn light" onclick="setActiveDrill('${drill.id}')" style="text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(drill.name)}</button><label style="font-size:11px">Min<input type="number" min="1" value="${Math.round((drill.durationSeconds || 60) / 60)}" onchange="setDrillDuration('${drill.id}', this.value)" style="padding:4px 6px"></label><span><button class="btn light" onclick="movePlaylist('${drill.id}', -1)" title="Move up">↑</button> <button class="btn light" onclick="movePlaylist('${drill.id}', 1)" title="Move down">↓</button></span><button class="btn light remove" onclick="removeFromPlaylist('${drill.id}')" title="Remove from playlist">Remove</button></div>`).join("") || `<div class="muted">Select drills from the player or drill pages.</div>`}</div>
            </details>
          </div>
        </section>
        <section class="card" style="margin-top:18px">
          <div class="panel-head">
            <div><div class="panel-title">Drills</div><div class="muted">Select drills here to add them to the playlist.</div></div>
            <div style="display:flex;align-items:center;gap:8px"><div style="border:1px solid #bbdfc8;background:#f0f9f3;border-radius:6px;padding:6px 10px;text-align:center"><span style="display:block;font-size:10px;font-weight:900;color:#15803d;text-transform:uppercase">Selected</span><strong style="display:block;font-size:20px;line-height:1;color:#15803d">${state.sessionDrillIds.length}</strong></div><div style="border:1px solid #dbe3dd;background:#f8fbf9;border-radius:6px;padding:6px 10px;text-align:center"><span style="display:block;font-size:10px;font-weight:900;color:#64746a;text-transform:uppercase">Minutes</span><strong style="display:block;font-size:20px;line-height:1;color:#17211b">${Math.round(sessionDrills().reduce((sum, drill) => sum + (drill.durationSeconds || 60), 0) / 60)}</strong></div><button class="btn light" onclick="setPage('Drills')">+ Add Drill</button></div>
          </div>
          <label style="margin-bottom:10px">Search drills
            <input id="drillSearch" type="search" placeholder="Type a drill name..." oninput="filterDrillRows(this.value)">
          </label>
          <div class="table-scroll drill-selector"><table class="drills-table"><thead><tr><th>#</th><th>Playlist</th><th>Drill</th><th>Time</th><th>Count</th><th>Video</th></tr></thead><tbody>
          ${d.map((x,i) => `<tr data-drill-name="${esc(x.name.toLowerCase())}"><td><strong>${i+1}</strong></td><td><label class="select-chip"><input type="checkbox" ${state.sessionDrillIds.includes(x.id)?"checked":""} onchange="toggleSessionDrill('${x.id}',this.checked)"> Add</label></td><td><button class="drill-name-btn" onclick="setActiveDrill('${x.id}', true)">${esc(x.name)}</button></td><td><input style="width:76px" value="${esc(x.timer || "1")}" onchange="editDrill('${x.id}','timer',this.value); state.drills.find(d=>d.id==='${x.id}').durationSeconds=parseDuration(this.value); save(); renderPreservingPosition();"></td><td><input style="width:70px" placeholder="Count" value="${esc(x.count || "")}" onchange="editDrill('${x.id}','count',this.value)"></td><td>${x.videoLink ? `<a class="btn light" href="${esc(x.videoLink)}" target="_blank">Video</a>` : ""}</td></tr>`).join("")}
          </tbody></table></div>
          <div class="muted" style="padding-top:10px">${d.length} drills available from Jordan 2.0 and the All Drills sheet.</div>
        </section>`;
      }

      function timerMarkup() {
        const drills = sessionDrills();
        const total = drills.length;
        const done = drills.filter(x => x.completed).length;
        const pct = total ? Math.round(done / total * 100) : 0;
        const activeDrill = selectedVideoDrill();
        const lastReps = latestSavedCount(activeDrill);
        const details = lastReps !== "" ? `Reps: ${esc(lastReps)}` : total && done >= total && !state.running && !state.resting ? "Complete" : state.running ? "Running" : state.resting ? "Rest" : "Press Start";
        const timePct = state.duration ? Math.max(0, Math.min(100, Math.round((state.seconds / state.duration) * 100))) : 0;
        return `<div class="panel-title">Training Timer</div>
        <label style="max-width:150px;margin-top:8px;font-size:12px">Countdown
          <select onchange="chooseDuration(Number(this.value))" style="padding:6px 8px">
            <option value="60" ${state.duration===60?"selected":""}>1:00</option>
            <option value="45" ${state.duration===45?"selected":""}>0:45</option>
            <option value="30" ${state.duration===30?"selected":""}>0:30</option>
          </select>
        </label>
        <label style="max-width:150px;margin-top:8px;font-size:12px">Rest seconds
          <input type="number" min="15" max="30" value="${esc(state.restDuration)}" onchange="setRestDuration(this.value)" style="padding:6px 8px">
        </label>
        <div class="timer-big">${fmtHms(state.seconds)}</div>
        <div class="countdown-bar" aria-label="Countdown time left"><span style="width:${timePct}%"></span></div>
        <div class="buttons">
          <button class="btn primary" onclick="timer(true)">Start</button>
          <button class="btn light" onclick="timer(false)">Pause</button><button class="btn light" onclick="chooseDuration(state.duration)">Reset</button>
        </div>
        ${state.pendingCountSave ? `<button class="btn primary" style="width:100%;margin-top:8px" onclick="saveSelectedCountForSession()">End Count & Save</button>` : ""}
        <div class="timer-summary">
          <div><span>Completed</span><strong>${done}/${total}</strong></div>
          <div><span>Progress</span><strong>${pct}%</strong></div>
          <div><span>Details</span><strong style="font-size:12px">${details}</strong></div>
          <div class="mini-progress"><div class="smallbar" style="height:7px;margin-top:2px"><span style="width:${pct}%"></span></div></div>
        </div>
        <div class="count-history">${(selectedVideoDrill()?.countHistory || []).slice(-3).reverse().map(entry => `<span>${esc(entry.date)}: ${esc(entry.count)}</span>`).join("")}</div>`;
      }
      function latestCountValue(drill) {
        if (!drill) return "";
        if (drill.count !== undefined && drill.count !== null && String(drill.count) !== "") return String(drill.count);
        const history = Array.isArray(drill.countHistory) ? drill.countHistory : [];
        const latest = history.at(-1)?.count;
        return latest === undefined || latest === null ? "" : String(latest);
      }
      function latestSavedCount(drill) {
        if (!drill) return "";
        const history = Array.isArray(drill.countHistory) ? drill.countHistory : [];
        const latest = history.at(-1)?.count;
        return latest === undefined || latest === null ? "" : String(latest);
      }
      function renderHomeTimer() { const el = document.getElementById("timerCard"); if (el) el.innerHTML = timerMarkup(); }
      function avg(d) { return d.length ? (d.reduce((s,x)=>s+Number(x.rating||0),0)/d.length).toFixed(1) : "0"; }
      function filterDrillRows(value) {
        const query = String(value || "").trim().toLowerCase();
        document.querySelectorAll(".drill-selector tbody tr").forEach(row => {
          row.style.display = !query || row.dataset.drillName.includes(query) ? "" : "none";
        });
      }
      function renderPreservingPosition() {
        const top = window.scrollY;
        const selectorTop = document.querySelector(".drill-selector")?.scrollTop || 0;
        const search = document.getElementById("drillSearch")?.value || "";
        render();
        requestAnimationFrame(() => {
          window.scrollTo(0, top);
          const input = document.getElementById("drillSearch");
          if (input) input.value = search;
          if (search) filterDrillRows(search);
          const selector = document.querySelector(".drill-selector");
          if (selector) selector.scrollTop = selectorTop;
        });
      }
      function toggleDrill(id, checked) { const d = state.drills.find(x => x.id === id); if (d) d.completed = checked; save(); render(); }
      function saveSession() { state.sessions.unshift({ id: crypto.randomUUID(), playerId: selectedPlayer().id, date: new Date().toISOString().slice(0,10), minutes: Math.max(1, Math.round(state.seconds/60)), completedDrills: playerDrills().filter(d=>d.completed).length, notes: "Saved from home training timer." }); save(); render(); }

      function renderPlayers() {
        return `<div class="page-title"><h2>Players</h2><p class="muted">Add, edit, and delete players.</p></div>
          <div class="form card"><label>Name<input id="newPlayerName"></label><label>Notes<input id="newPlayerNotes"></label><button class="btn primary" onclick="addPlayer()">Add Player</button></div>
          <div class="grid two">${state.players.map(p => `<section class="card"><h3>${esc(p.name)}</h3><label>Name<input value="${esc(p.name)}" onchange="editPlayer('${p.id}','name',this.value)"></label><label>Notes<textarea onchange="editPlayer('${p.id}','notes',this.value)">${esc(p.notes)}</textarea></label><button class="btn danger" onclick="deletePlayer('${p.id}')">Delete</button></section>`).join("")}</div>`;
      }
      function addPlayer() { const n = document.getElementById("newPlayerName").value.trim(); if (!n) return; state.players.push({ id: crypto.randomUUID(), name: n, notes: document.getElementById("newPlayerNotes").value.trim(), drillIds: [] }); save(); render(); }
      function editPlayer(id, field, value) { const p = state.players.find(x => x.id === id); if (p) p[field] = value; save(); }
      function deletePlayer(id) { state.players = state.players.filter(p => p.id !== id); state.selectedPlayer = state.players[0]?.id || ""; save(); render(); }
      function uploadPlayerPhoto(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          const p = selectedPlayer();
          if (!p) return;
          p.photoDataUrl = String(reader.result || "");
          save();
          render();
        };
        reader.readAsDataURL(file);
      }

      function renderDrills() {
        return `<div class="page-title"><h2>Drills</h2><p class="muted">Add, edit, delete, complete, and rate drills.</p></div>
          <div class="form card"><label>Name<input id="newDrillName"></label><label>Video link<input id="newDrillVideo"></label><label>Notes<input id="newDrillNotes"></label><button class="btn primary" onclick="addDrill()">Add Drill</button></div>
          <section class="card compact-list">${state.drills.map(d => `<div class="row"><input type="checkbox" ${d.completed?"checked":""} onchange="toggleDrill('${d.id}',this.checked)"><div><strong>${esc(d.name)}</strong><div class="muted">${esc(d.notes)}</div></div><span class="meta">${esc(d.timer)} min</span><input style="width:58px" type="number" min="1" max="5" value="${d.rating}" onchange="rateDrill('${d.id}',this.value)"><div class="actions">${d.videoLink ? `<a class="btn light" href="${esc(d.videoLink)}" target="_blank">Video</a>` : ""}<button class="btn danger" onclick="deleteDrill('${d.id}')">Delete</button></div></div>`).join("")}</section>`;
      }
      function addDrill() { const n = document.getElementById("newDrillName").value.trim(); if (!n) return; const d = { id: crypto.randomUUID(), name: n, videoLink: document.getElementById("newDrillVideo").value.trim(), notes: document.getElementById("newDrillNotes").value.trim(), completed: false, rating: 3, timer: "1" }; state.drills.unshift(d); state.players.forEach(p => p.drillIds.push(d.id)); save(); render(); }
      function rateDrill(id, value) { const d = state.drills.find(x => x.id === id); if (d) d.rating = Number(value); save(); }
      function editDrill(id, field, value) { const d = state.drills.find(x => x.id === id); if (d) d[field] = value; save(); }
      function setVideoLink(id, value) { const d = state.drills.find(x => x.id === id) || selectedVideoDrill(); if (d) { d.videoLink = value; state.selectedVideoDrill = d.id; } save(); render(); }
      function setSelectedCount(value) {
        const d = selectedVideoDrill();
        if (d) {
          d.count = String(value);
        }
        save();
        renderHomeTimer();
      }
      function setRestDuration(value) {
        state.restDuration = Math.min(30, Math.max(15, Number(value || 30)));
        if (!state.resting) state.restSeconds = state.restDuration;
        save();
        renderHomeTimer();
      }
      function saveSelectedCountForSession() {
        saveCountOnly();
        state.pendingCountSave = false;
        save();
        advancePlaylist();
      }
      function saveCountOnly() {
        const d = selectedVideoDrill();
        const number = Number(d?.count);
        if (d && Number.isFinite(number)) {
          d.countHistory = Array.isArray(d.countHistory) ? d.countHistory : [];
          d.countHistory.push({ id: crypto.randomUUID(), date: new Date().toISOString().slice(0, 10), count: number, sessionId: state.sessions[0]?.id || "current-session" });
          d.completed = true;
        }
      }
      function toggleSessionDrill(id, checked) {
        state.sessionDrillIds = checked ? [...new Set([...(state.sessionDrillIds || []), id])] : (state.sessionDrillIds || []).filter(x => x !== id);
        if (!state.sessionDrillIds.includes(state.selectedVideoDrill)) state.selectedVideoDrill = state.sessionDrillIds[0] || "";
        save();
        renderPreservingPosition();
      }
      function removeFromPlaylist(id) {
        toggleSessionDrill(id, false);
      }
      function clearPlaylist() {
        state.drills.forEach(drill => {
          drill.completed = false;
          drill.count = "";
          drill.countHistory = [];
        });
        state.sessionDrillIds = [];
        state.selectedVideoDrill = "";
        state.running = false;
        state.pendingCountSave = false;
        state.resting = false;
        clearInterval(tick);
        clearInterval(restTick);
        stopVideoNow();
        save();
        renderPreservingPosition();
      }
      function setDrillDuration(id, minutes) {
        const d = state.drills.find(x => x.id === id);
        const seconds = Math.max(1, Number(minutes || 1)) * 60;
        if (d) {
          d.durationSeconds = seconds;
          d.timer = String(minutes);
          if (selectedVideoDrill()?.id === id) chooseDuration(seconds);
          else { save(); render(); }
        }
      }
      function movePlaylist(id, direction) {
        const ids = [...(state.sessionDrillIds || [])];
        const index = ids.indexOf(id);
        const nextIndex = index + direction;
        if (index < 0 || nextIndex < 0 || nextIndex >= ids.length) return;
        [ids[index], ids[nextIndex]] = [ids[nextIndex], ids[index]];
        state.sessionDrillIds = ids;
        save();
        render();
      }
      function deleteDrill(id) { state.drills = state.drills.filter(d => d.id !== id); state.players.forEach(p => p.drillIds = p.drillIds.filter(x => x !== id)); save(); render(); }

      function renderSessions() {
        return `<div class="page-title"><h2>Training Sessions</h2><p class="muted">Log training time and coach notes.</p></div>
          <div class="form card"><select id="sessionPlayer">${state.players.map(p => `<option value="${p.id}">${esc(p.name)}</option>`).join("")}</select><input id="sessionDate" type="date" value="${new Date().toISOString().slice(0,10)}"><input id="sessionMinutes" type="number" value="30"><input id="sessionDone" type="number" value="0"><textarea id="sessionNotes" placeholder="Session notes"></textarea><button class="btn primary" onclick="addSession()">Save Session</button></div>
          <div class="grid">${state.sessions.map(s => `<section class="card"><div class="top"><strong>${esc(state.players.find(p=>p.id===s.playerId)?.name || "Player")}</strong><span class="muted">${esc(s.date)}</span></div><p>${s.minutes} minutes, ${s.completedDrills} completed drills</p><p class="muted">${esc(s.notes)}</p></section>`).join("")}</div>`;
      }
      function addSession() { state.sessions.unshift({ id: crypto.randomUUID(), playerId: sessionPlayer.value, date: sessionDate.value, minutes: Number(sessionMinutes.value), completedDrills: Number(sessionDone.value), notes: sessionNotes.value }); save(); render(); }

      function renderProgress() {
        return `<div class="page-title"><h2>Progress</h2><p class="muted">Quick progress view by player and drill count.</p></div><div class="grid two">${state.players.map(p => { const d = state.drills.filter(x => p.drillIds.includes(x.id)); const pct = d.length ? Math.round(d.filter(x => x.completed).length / d.length * 100) : 0; const mins = state.sessions.filter(s => s.playerId===p.id).reduce((a,s)=>a+s.minutes,0); return `<section class="card"><h3>${esc(p.name)}</h3><div class="progressbar"><span style="width:${pct}%"></span></div><p>${pct}% complete</p><p class="muted">${mins} total training minutes</p><div style="margin-top:14px">${d.filter(x => (x.countHistory||[]).length).slice(0,8).map(x => `<div style="display:flex;justify-content:space-between;border-top:1px solid #edf1ee;padding:8px 0"><span>${esc(x.name)}</span><strong>${esc((x.countHistory||[]).at(-1)?.count ?? "")}</strong></div>`).join("")}</div></section>`; }).join("")}</div><button class="btn light" style="margin-top:18px" onclick="resetTracker()">Reset to Excel sample data</button>`;
      }

      function render() {
        try {
          normalizeState();
          renderNav();
          const pageHtml = state.page === "Home" ? renderHome() : state.page === "Players" ? renderPlayers() : state.page === "Drills" ? renderDrills() : state.page === "Training Sessions" ? renderSessions() : renderProgress();
          document.getElementById("app").innerHTML = `${pageHtml}<div id="restOverlay">${state.resting ? restOverlayMarkup() : ""}</div>`;
        } catch (error) {
          console.error(error);
          document.getElementById("app").innerHTML = `<section class="card"><div class="panel-title">Home screen needs a refresh</div><p class="muted" style="margin:12px 0">Your saved browser data was out of date. Tap the button below to reload the tracker with the Excel drills.</p><button class="btn primary" onclick="resetTracker()">Reload tracker</button></section>`;
        }
      }
      render();
      if (state.running) timer(true);
    </script>
  </body>
</html>
